<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Q3 2nd Graded Exercise">
    <meta name="keywords" content="HTML Forms">
    <meta name="author" content="AL Mendoza">
    <title>2nd Graded</title>
    <!-- updated external css link to show how to share it between repository -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../styles.css" />
    <script src="script.js" defer></script>
    <style>
        body {
            padding: 25px;
            font-family: 'Times New Roman', Times, serif;
            width: 80%;
            margin-left: 10%;
        }

        .background {
            color: whitesmoke
        }

        .title {
            color: #050505;
        }

        fieldset:nth-child(2) {
            margin-top: 20px;
        }

        legend {
            background: rgb(110, 46, 46);
            color: rgb(255, 204, 204);
            padding: 5px;
        }

        label {
            margin: 5%;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <img src="../../assets/pshslogo.png" alt="pshs logo" title="The Official Logo" width="50px" height="50px" />
            <h1>
                Sample Use of HTML Form
            </h1>
            <h3>by Ashley Quilaton </h3>
        </div>
        <nav class="navbar">
            <a href="../index.html"> Home </a>
            <a href="registered.html"> Back to Sign up </a>
        </nav>
    </header>
    <section>
        <h1 class="title">utot</h1>

        <form id="dForm" action="registered.html" method="get">
            <fieldset>
                <legend>Your Credentials</legend><br />
                <label> Student Id:
                    <input type="number" name="id" id="id" required />
                </label><br /><br />
                <label> Full Name:
                    <input type="text" name="uname" id="uname" required />
                </label><br /><br />
                <label> Birthday :
                    <input type="date" name="dob" id="dob" />
                </label><br /><br />
                <label> Email Address :
                    <input type="email" name="email" id="email" required />
                </label><br /><br />
            </fieldset>
        </form>
    </section>
    <script src="public/script.js"></script>
</body>

</html>
